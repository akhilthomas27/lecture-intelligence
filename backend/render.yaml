# Render.com Blueprint for the Lecture Intelligence backend.
#
# Usage:
#   1. Push the repo to GitHub.
#   2. In the Render dashboard: New + → Blueprint → connect this repo.
#   3. When prompted, set the root directory to `backend` (so Render finds
#      this file and runs commands from inside the backend folder).
#   4. Set GEMINI_API_KEY in the dashboard — it is intentionally NOT
#      committed (`sync: false` below).
#
# Note: sentence-transformers pulls in PyTorch (~700 MB) and
# chromadb is also heavy, so the build is slow and memory-tight on the
# free plan. Bump to `starter` if you hit OOM at startup.

services:
  - type: web
    name: lecture-intelligence-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPADATA_API_KEY
        sync: false